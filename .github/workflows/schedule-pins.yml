# Scheduled Pinterest Pin posting (production-style, free, resume-friendly)
# Runs on cron and can be triggered manually. Uses GitHub Secrets for credentials.
name: Schedule Pinterest Pins

on:
  schedule:
    # GitHub cron is UTC only. These approximate 09:00–21:00 US Pacific (PDT, UTC-7):
    #   UTC 16:00–23:30 + 00:00–03:30 + 04:00 ≈ PT 09:00–21:00 every 30 min + 21:00.
    # During PST (UTC-8), runs skew ~1h earlier in PT; edit hours (+1) Nov–Mar if needed.
    - cron: '*/30 16-23 * * *'
    - cron: '*/30 0-3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  post-pins:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push "moved to posted" changes so we don't re-post
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat << 'EOF' > .env
          PINTEREST_CLIENT_ID=${{ secrets.PINTEREST_CLIENT_ID }}
          PINTEREST_CLIENT_SECRET=${{ secrets.PINTEREST_CLIENT_SECRET }}
          PINTEREST_REDIRECT_URI=${{ secrets.PINTEREST_REDIRECT_URI }}
          PORT=3000
          PINTEREST_USE_SANDBOX=${{ secrets.PINTEREST_USE_SANDBOX }}
          PIN_WEBSITE_LINK=https://www.thecabination.com
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Create tokens.json from secret
        env:
          PINTEREST_TOKENS_JSON: ${{ secrets.PINTEREST_TOKENS_JSON }}
        run: echo "$PINTEREST_TOKENS_JSON" > tokens.json

      - name: Random delay (0–5 min)
        run: sleep $(( RANDOM % 301 ))

      - name: Run post-pins
        run: |
          npm run post-pins -- --board=${{ secrets.PIN_BOARD_ID }} --ai-fields --dir=./schedule-images --max=1 --shuffle
        env:
          NODE_ENV: production

      - name: Commit moved images (avoid re-posting next run)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule-images/
          git diff --staged --quiet || (git commit -m "chore(schedule): move posted image to schedule-images/posted" && git push)
